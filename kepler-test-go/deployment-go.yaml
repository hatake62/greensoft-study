apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-idle-app
  labels:
    app: go-idle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-idle
  template:
    metadata:
      labels:
        app: go-idle
    spec:
      containers:
      - name: go-container
        image: go-idle-image:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "200m"
            memory: "128Mi"
          requests:
            cpu: "100m"
            memory: "64Mi"