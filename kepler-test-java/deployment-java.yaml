apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-idle-app
  labels:
    app: java-idle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-idle
  template:
    metadata:
      labels:
        app: java-idle
    spec:
      containers:
      - name: java-container
        image: java-idle-image:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"